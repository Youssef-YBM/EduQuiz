<div class="card h-100 shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h5 class="card-title text-primary">{{ quiz.title }}</h5>
      <span class="badge {{ getLevelClass() }}">{{ quiz.level }}</span>
    </div>
    
    <p class="card-text text-muted">{{ quiz.description }}</p>
    
    <div class="d-flex justify-content-between align-items-center mt-3">
      <small class="text-muted">
        <i class="fa fa-question-circle"></i> {{ quiz.questions.length }} questions
      </small>
    </div>
    
    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-success btn-sm" (click)="onPlay()" *ngIf="authService.getCurrentUser()?.role === 'student'">
        <i class="fa fa-play"></i> Jouer
      </button>
      
      <ng-container *ngIf="showActions">
        <button class="btn btn-warning btn-sm" (click)="onEdit()">
          <i class="fa fa-edit"></i> Modifier
        </button>
        <button class="btn btn-danger btn-sm" (click)="onDelete()">
          <i class="fa fa-trash"></i> Supprimer
        </button>
      </ng-container>
    </div>
  </div>
</div>
