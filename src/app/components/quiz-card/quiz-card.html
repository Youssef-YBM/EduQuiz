<div class="card h-100 border-0 shadow-lg hover-lift">
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-start mb-3">
      <h5 class="card-title text-gradient mb-0">{{ quiz.title }}</h5>
      <span class="badge {{ getLevelClass() }} px-3 py-2">
        {{ quiz.level }}
      </span>
    </div>
    
    <p class="card-text text-muted mb-3">{{ quiz.description }}</p>
    
    <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
      <small class="text-muted">
        📋 {{ quiz.questions.length }} questions
      </small>
      <small class="text-muted" *ngIf="quiz.ownerName">
        👤 {{ quiz.ownerName }}
      </small>
    </div>
    
    <div class="d-flex gap-2">
      <button class="btn btn-success btn-sm flex-grow-1" (click)="onPlay()" 
              *ngIf="authService.getCurrentUser()?.role === 'student'">
        🎯 Jouer
      </button>
      
      <ng-container *ngIf="showActions">
        <button class="btn btn-warning btn-sm" (click)="onEdit()">
          ✏️
        </button>
        <button class="btn btn-danger btn-sm" (click)="onDelete()">
          🗑️
        </button>
      </ng-container>
    </div>
  </div>
</div>
