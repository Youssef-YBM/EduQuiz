<div class="container mt-4">
  <div class="row mb-4">
    <div class="col">
      <h2><i class="fa fa-users me-2"></i>Gestion des utilisateurs</h2>
      <p class="text-muted">Gérez les comptes utilisateurs de la plateforme</p>
    </div>
  </div>
  
  <div class="card shadow">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Statut</th><th>Actions</th></tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of users">
              <td>{{ user.name }}</td>
              <td>{{ user.email }}</td>
              <td><span class="badge {{ getRoleBadge(user.role) }}">{{ user.role }}</span></td>
              <td>
                <span class="badge" [class.bg-success]="!user.banned" [class.bg-danger]="user.banned">
                  {{ user.banned ? 'Banni' : 'Actif' }}
                </span>
              </td>
              <td>
                <div class="btn-group btn-group-sm">
                  <button class="btn btn-warning" (click)="changeRole(user, user.role === 'student' ? 'teacher' : 'student')">
                    {{ user.role === 'student' ? 'Promouvoir' : 'Rétrograder' }}
                  </button>
                  <button class="btn btn-secondary" (click)="toggleBan(user)">
                    {{ user.banned ? 'Débannir' : 'Bannir' }}
                  </button>
                  <button class="btn btn-danger" (click)="deleteUser(user)" [disabled]="user.id === currentUserId">
                    <i class="fa fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
