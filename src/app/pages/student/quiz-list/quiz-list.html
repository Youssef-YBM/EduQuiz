<!-- quiz-list.html - Version Premium -->
<div class="container mt-4 pt-3">
  <div class="row mb-5">
    <div class="col text-center">
      <h1 class="display-4 fw-bold text-gradient mb-3">🎯 Quiz disponibles</h1>
      <p class="text-white-50 fs-5">Testez vos connaissances et améliorez-vous</p>
    </div>
  </div>
  
  <!-- Barre de recherche et filtres -->
  <div class="glass-card p-4 mb-5">
    <div class="row g-3 align-items-end">
      <div class="col-md-6">
        <label class="form-label fw-semibold">🔍 Rechercher</label>
        <input type="text" class="premium-input" placeholder="Titre du quiz..." 
               [(ngModel)]="searchTerm" (ngModelChange)="onSearch()">
      </div>
      
      <div class="col-md-4">
        <label class="form-label fw-semibold">📊 Niveau</label>
        <select class="premium-select" [(ngModel)]="selectedLevel" (change)="onLevelChange()">
          <option *ngFor="let level of levels" [value]="level">{{ level }}</option>
        </select>
      </div>
      
      <div class="col-md-2">
        <button class="btn btn-secondary w-100" (click)="resetFilters()">
          🔄 Réinitialiser
        </button>
      </div>
    </div>
  </div>
  
  <!-- Grille des quiz -->
  <div class="row g-4" *ngIf="filteredQuizzes.length > 0; else noQuizzes">
    <div class="col-md-4 col-lg-3" *ngFor="let quiz of filteredQuizzes">
      <app-quiz-card [quiz]="quiz" (play)="playQuiz($event)"></app-quiz-card>
    </div>
  </div>
  
  <ng-template #noQuizzes>
    <div class="empty-state text-center py-5">
      <div class="empty-icon mb-3">📭</div>
      <h3 class="text-white-50">Aucun quiz trouvé</h3>
      <p class="text-white-50">Essayez de modifier vos critères de recherche</p>
      <button class="btn btn-primary mt-3" (click)="resetFilters()">
        🔄 Réinitialiser les filtres
      </button>
    </div>
  </ng-template>
</div>
