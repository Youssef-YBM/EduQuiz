<div class="container mt-4">
  <div class="row mb-4">
    <div class="col">
      <h2><i class="fa fa-list me-2"></i>Quiz disponibles</h2>
      <p class="text-muted">Testez vos connaissances et améliorez-vous !</p>
    </div>
  </div>
  
  <!-- Search and Filters -->
  <div class="row mb-4">
    <div class="col-md-6">
      <div class="input-group">
        <span class="input-group-text"><i class="fa fa-search"></i></span>
        <input type="text" class="form-control" placeholder="Rechercher un quiz..." 
               [(ngModel)]="searchTerm" (ngModelChange)="onSearch()">
      </div>
    </div>
    
    <div class="col-md-4">
      <select class="form-control" [(ngModel)]="selectedLevel" (change)="onLevelChange()">
        <option *ngFor="let level of levels" [value]="level">{{ level }}</option>
      </select>
    </div>
    
    <div class="col-md-2">
      <button class="btn btn-outline-secondary w-100" (click)="resetFilters()">
        <i class="fa fa-refresh"></i> Réinitialiser
      </button>
    </div>
  </div>
  
  <!-- Quiz Grid -->
  <div class="row" *ngIf="filteredQuizzes.length > 0; else noQuizzes">
    <div class="col-md-4 col-lg-3 mb-4" *ngFor="let quiz of filteredQuizzes">
      <!-- ICI: $event contient déjà le quiz, on le passe directement -->
      <app-quiz-card [quiz]="quiz" (play)="playQuiz($event)"></app-quiz-card>
    </div>
  </div>
  
  <ng-template #noQuizzes>
    <div class="alert alert-info text-center">
      <i class="fa fa-info-circle"></i> Aucun quiz trouvé
    </div>
  </ng-template>
</div>
