<div class="container mt-4">
  <div class="row mb-4">
    <div class="col">
      <h2><i class="fa fa-book me-2"></i>Mes quiz</h2>
      <p class="text-muted">Gérez vos quiz créés</p>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary" (click)="createQuiz()">
        <i class="fa fa-plus"></i> Créer un quiz
      </button>
    </div>
  </div>
  
  <div class="row">
    <div class="col" *ngIf="quizzes.length === 0">
      <div class="alert alert-info text-center">
        Vous n'avez pas encore créé de quiz.
        <a href="#" (click)="createQuiz(); $event.preventDefault()">Créez votre premier quiz</a>
      </div>
    </div>
    
    <div class="col-md-4 col-lg-3 mb-4" *ngFor="let quiz of quizzes">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title text-primary">{{ quiz.title }}</h5>
            <span class="badge {{ getLevelClass(quiz.level) }}">{{ quiz.level }}</span>
          </div>
          <p class="card-text text-muted">{{ quiz.description }}</p>
          <div class="mb-3">
            <small class="text-muted"><i class="fa fa-question-circle"></i> {{ quiz.questions.length }} questions</small>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-warning btn-sm" (click)="editQuiz(quiz)"><i class="fa fa-edit"></i> Modifier</button>
            <button class="btn btn-danger btn-sm" (click)="deleteQuiz(quiz)"><i class="fa fa-trash"></i> Supprimer</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
